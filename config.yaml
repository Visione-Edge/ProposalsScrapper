# Configuración general del monitor de licitaciones SICOP

# Cuántas licitaciones traer por página (max 100)
page_size: 50

# Máximo de páginas a recorrer por ejecución (0 = sin límite)
max_pages: 0

# Días hacia atrás a consultar (para scan diario, 3 es suficiente)
days_back: 3

# Segundos de espera entre requests a la API
request_delay: 1.0

# Base de datos SQLite donde se guardan las licitaciones vistas
database: data/licitaciones.db

# Archivo HTML del dashboard
dashboard_output: data/dashboard.html

# Niveles mínimos de relevancia para notificar (alta, media, baja)
notify_min_relevance: media

# Horario del scan automático diario
schedule:
  hour: 7        # Hora (0-23) en America/Costa_Rica
  minute: 0
  days: "mon-fri"  # Días: mon, tue, wed, thu, fri, sat, sun (o rangos mon-fri)

# Notificaciones
notifications:
  slack:
    enabled: false
    webhook_url: ""
  discord:
    enabled: false
    webhook_url: ""
  email:
    enabled: true
    # Servidor SMTP (Gmail: smtp.gmail.com, Outlook: smtp.office365.com)
    host: "smtp.gmail.com"
    port: 587
    # Usuario SMTP (tu dirección de correo remitente)
    username: ""
    # Contraseña: definila en .env como SMTP_PASSWORD (no la pongas aquí)
    password: ""
    # Destinatarios
    recipients:
      - "info@visione-edge.com"
    # Notificar cuando hay licitaciones nuevas relevantes
    notify_on_new: true
    # Notificar cuando una licitación favorita entra en estado de contrato/adjudicación
    notify_on_contract: true

# Filtros opcionales de tipos de procedimiento a incluir (SICOP)
# (vacío = todos). Códigos: LN, LI, LA, PP, CD, CE, RE, LD
procedure_types: []

# Filtros opcionales de instituciones (por código). Vacío = todas
institutions: []

# Fuentes de licitaciones
sources:
  sicop:
    enabled: true
    page_size: 50
    request_delay: 1.0
  worldbank:
    enabled: true
    country: "Costa Rica"
    rows_per_page: 50
  undp:
    enabled: true
    region: "RLA"
    country_filter: "COSTA RICA"
  idb:
    enabled: true
    country_filter: "COSTA RICA"
  bcie:
    enabled: false
    request_delay: 2.0
  caf:
    enabled: false
    request_delay: 2.0
